name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - run: go build ./cmd/exporter

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=${GITHUB_REF_NAME}
          GIT_HASH=$(git rev-parse HEAD)
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.gitCommit=${GIT_HASH}" -o sendgrid_exporter ./cmd/exporter
          tar czf sendgrid_exporter-${VERSION}-linux-amd64.tar.gz sendgrid_exporter
          rm sendgrid_exporter

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          VERSION=${GITHUB_REF_NAME}
          GIT_HASH=$(git rev-parse HEAD)
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.gitCommit=${GIT_HASH}" -o sendgrid_exporter ./cmd/exporter
          tar czf sendgrid_exporter-${VERSION}-linux-arm64.tar.gz sendgrid_exporter
          rm sendgrid_exporter

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            git log --pretty=format:"- %s" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Helm chart
        run: |
          helm package charts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            sendgrid_exporter-*.tar.gz
            sendgrid-stats-exporter-*.tgz
